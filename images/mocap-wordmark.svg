<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">MOCAP wordmark</title>
  <desc id="desc">Missouri Center for Advanced Power Research wordmark with a circular sunrise and battery icon.</desc>
  <defs>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8ec"/>
      <stop offset="100%" stop-color="#f3e8d2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3c98f"/>
      <stop offset="100%" stop-color="#cd7345"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dceef8"/>
      <stop offset="52%" stop-color="#f5d3a6"/>
      <stop offset="100%" stop-color="#f8f3e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
